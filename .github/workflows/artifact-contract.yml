name: Artifact contract

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate hardware and simulation artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check generated fabrication manifest
        run: python3 scripts/generate_fabrication_manifest.py --check

      - name: Validate artifact references
        run: python3 scripts/validate_artifact_contract.py
